<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ============================================================
       DISCORD EMBED META TAGS
       Discord reads these when a link is pasted. Each video page
       gets its own <meta> tags via JS – the main page shows a
       generic preview.
  ============================================================ -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="2K26 Spoils" />
  <meta property="og:title"       content="2K26 Spoils" />
  <meta property="og:description" content="Browse and share videos." />
  <!-- Replace with your real GitHub Pages URL -->
  <meta property="og:url"         content="https://YOUR_USERNAME.github.io/YOUR_REPO/" />

  <title>2K26 Spoils</title>

  <style>
    /* ── Tokens ────────────────────────────────────────────────── */
    :root {
      --bg:        #0a0710;
      --surface:   #110d1a;
      --card:      #1a1428;
      --border:    #2d1f4a;
      --accent:    #9b4dff;
      --accent2:   #c084fc;
      --text:      #e8e0f5;
      --muted:     #9080b0;
      --radius:    10px;
      --font:      'Inter', system-ui, sans-serif;
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse 60% 40% at 50% -10%, rgba(155,77,255,.18) 0%, transparent 70%);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }
    .header-right { display: flex; gap: 10px; align-items: center; }
    .search-box {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      width: 220px;
      outline: none;
      transition: border-color .2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--muted); }

    /* ── Hero ──────────────────────────────────────────────────── */
    .hero {
      padding: 52px 32px 36px;
      max-width: 900px;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .hero h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p { color: var(--muted); font-size: 1.05rem; max-width: 520px; }
    .tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
    .tag {
      padding: 4px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .tag:hover, .tag.active {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(155,77,255,.15);
    }

    /* ── Grid ──────────────────────────────────────────────────── */
    .grid-wrap { max-width: 900px; margin: 0 auto; padding: 0 32px 60px; }
    #video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      padding: 60px 0;
      font-size: 1rem;
    }

    /* ── Card ──────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform .18s, border-color .18s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
    }
    .card-thumb {
      position: relative;
      aspect-ratio: 16/9;
      background: #111;
      overflow: hidden;
    }
    .card-thumb video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .18s;
    }
    .card:hover .thumb-overlay { opacity: 1; }
    .play-btn {
      width: 48px; height: 48px;
      background: rgba(255,255,255,.15);
      border: 2px solid rgba(255,255,255,.5);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .play-btn svg { margin-left: 3px; }

    .card-tag-badge {
      position: absolute;
      top: 8px; left: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .card-body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      flex: 1;
    }
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .btn {
      flex: 1;
      padding: 7px 10px;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 600;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-discord {
      background: var(--accent);
      color: #fff;
    }
    .btn-discord:hover { opacity: .88; }
    .btn-copy {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-copy:hover { border-color: var(--muted); }
    .btn-copy.copied {
      background: rgba(87,211,79,.15);
      border-color: #57d34f;
      color: #57d34f;
    }

    /* ── Modal / video viewer ──────────────────────────────────── */
    #modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.8);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #modal-backdrop.open { display: flex; }
    #modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      max-width: 800px;
      width: 100%;
      overflow: hidden;
    }
    #modal-video { width: 100%; display: block; aspect-ratio: 16/9; background: #000; }
    .modal-footer {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .modal-title { font-weight: 700; font-size: 1rem; }
    .modal-actions { display: flex; gap: 8px; }
    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      padding: 0 4px;
    }
    .modal-close:hover { color: var(--text); }

    /* ── Toast ─────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: #fff;
      padding: 10px 22px;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      z-index: 300;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }


    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      .hero, .grid-wrap, .howto { padding-left: 16px; padding-right: 16px; }
      .search-box { width: 140px; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    2K26 Spoils
  </div>
  <div class="header-right">
    <input class="search-box" type="search" id="search" placeholder="Search videos…" />
  </div>
</header>

<!-- ── Hero ────────────────────────────────────────────────────── -->
<section class="hero">
  <h1><span>2K26 Spoils</span></h1>
  <p>Browse and share clips. Paste any Discord link to embed instantly.</p>
  <div class="tag-row" id="tag-row">
    <button class="tag active" data-tag="all">All</button>
    <!-- tags auto-generated from video list below -->
  </div>
</section>


<!-- ── Grid ────────────────────────────────────────────────────── -->
<div class="grid-wrap">
  <div id="video-grid"></div>
</div>

<!-- ── Modal ───────────────────────────────────────────────────── -->
<div id="modal-backdrop">
  <div id="modal-box">
    <video id="modal-video" controls preload="metadata"></video>
    <div class="modal-footer">
      <span class="modal-title" id="modal-title"></span>
      <div class="modal-actions">
        <button class="btn btn-discord" id="modal-discord-btn">
          <!-- Discord icon -->
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M13.545 1.017A13.267 13.267 0 0 0 10.32 0c-.143.258-.31.605-.424.882a12.265 12.265 0 0 0-3.793 0A9.877 9.877 0 0 0 5.68 0 13.283 13.283 0 0 0 2.452 1.02C.353 4.157-.216 7.213.068 10.227a13.37 13.37 0 0 0 4.084 2.073c.33-.449.622-.927.874-1.431a8.697 8.697 0 0 1-1.376-.665c.115-.085.228-.173.337-.263 2.651 1.227 5.537 1.227 8.156 0 .11.09.222.178.337.263-.44.26-.9.486-1.378.666.252.504.544.983.875 1.43a13.344 13.344 0 0 0 4.087-2.073c.335-3.514-.571-6.541-2.52-9.21ZM5.34 8.375c-.818 0-1.49-.754-1.49-1.676 0-.921.657-1.678 1.49-1.678.832 0 1.504.757 1.49 1.678 0 .922-.657 1.676-1.49 1.676Zm5.32 0c-.819 0-1.49-.754-1.49-1.676 0-.921.657-1.678 1.49-1.678.833 0 1.504.757 1.49 1.678 0 .922-.656 1.676-1.49 1.676Z" fill="currentColor"/></svg>
          Share to Discord
        </button>
        <button class="btn btn-copy" id="modal-copy-btn">Copy Link</button>
        <button class="modal-close" id="modal-close-btn">✕</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Toast ────────────────────────────────────────────────────── -->
<div id="toast">Link copied!</div>


<script>
  // ================================================================
  //  ✏️  EDIT THIS SECTION TO ADD YOUR VIDEOS
  //
  //  file: path relative to this index.html (e.g. "videos/clip.mp4")
  //        OR a full URL to a raw GitHub file.
  //  title: display name
  //  desc: short description (optional)
  //  tag: category shown in filter buttons (optional)
  //  poster: thumbnail image path (optional, else first frame used)
  // ================================================================
  const VIDEOS = [
    {
      file:   "5020inventory.mov",
      title:  "5020 - Inventory",
      desc:   "First Spoil",
      tag:    "Demo",
    },
    // ── Add more videos here ─────────────────────────────────────
    // {
    //   file:   "videos/myclip.mp4",
    //   title:  "My Clip",
    //   desc:   "Description here",
    //   tag:    "Gaming",
    //   poster: "thumbs/myclip.jpg",
    // },
  ];

  // ================================================================
  //  ✏️  SET YOUR GITHUB PAGES BASE URL (no trailing slash)
  //  Example: "https://yourname.github.io/my-videos"
  // ================================================================
  const BASE_URL = window.location.origin + window.location.pathname.replace(/\/$/, "");

  // ================================================================
  //  Internal: build per-video Discord-embeddable pages on the fly
  //  using the ?v= query parameter. Discord fetches the URL and reads
  //  the <meta> tags to build a rich embed with a video player.
  // ================================================================

  // If this page was loaded with ?v=INDEX, render a single-video page
  // that Discord can embed.
  const params = new URLSearchParams(window.location.search);
  const videoIndex = params.get("v");
  if (videoIndex !== null) {
    const v = VIDEOS[parseInt(videoIndex, 10)];
    if (v) {
      // Rewrite the og meta tags so Discord sees the video
      const absFile = v.file.startsWith("http") ? v.file : BASE_URL + "/" + v.file;
      document.title = v.title;
      setMeta("og:title",       v.title);
      setMeta("og:description", v.desc || "");
      setMeta("og:url",         window.location.href);
      setMeta("og:type",        "video.other");
      // These make Discord show a video player
      setMeta("og:video",              absFile);
      setMeta("og:video:secure_url",   absFile);
      setMeta("og:video:type",         "video/mp4");
      setMeta("og:video:width",        "1280");
      setMeta("og:video:height",       "720");
      if (v.poster) {
        const absPoster = v.poster.startsWith("http") ? v.poster : BASE_URL + "/" + v.poster;
        setMeta("og:image", absPoster);
      }
    }
  }

  function setMeta(property, content) {
    let el = document.querySelector(`meta[property="${property}"]`);
    if (!el) { el = document.createElement("meta"); el.setAttribute("property", property); document.head.appendChild(el); }
    el.setAttribute("content", content);
  }

  // ── Build the gallery UI ─────────────────────────────────────── //
  const grid     = document.getElementById("video-grid");
  const tagRow   = document.getElementById("tag-row");
  const searchEl = document.getElementById("search");
  const backdrop = document.getElementById("modal-backdrop");
  const modalVid = document.getElementById("modal-video");
  const modalTitle = document.getElementById("modal-title");
  const toast    = document.getElementById("toast");

  let activeTag  = "all";

  // Collect unique tags
  const allTags = [...new Set(VIDEOS.map(v => v.tag).filter(Boolean))];
  allTags.forEach(tag => {
    const btn = document.createElement("button");
    btn.className = "tag"; btn.dataset.tag = tag; btn.textContent = tag;
    tagRow.appendChild(btn);
  });
  tagRow.addEventListener("click", e => {
    const btn = e.target.closest(".tag"); if (!btn) return;
    activeTag = btn.dataset.tag;
    tagRow.querySelectorAll(".tag").forEach(b => b.classList.toggle("active", b === btn));
    render();
  });
  searchEl.addEventListener("input", render);

  function discordLink(i) {
    return BASE_URL + "/index.html?v=" + i;
  }

  function render() {
    const q = searchEl.value.trim().toLowerCase();
    grid.innerHTML = "";
    let count = 0;
    VIDEOS.forEach((v, i) => {
      const matchTag  = activeTag === "all" || v.tag === activeTag;
      const matchText = !q || v.title.toLowerCase().includes(q) || (v.desc || "").toLowerCase().includes(q);
      if (!matchTag || !matchText) return;
      count++;
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-thumb">
          <video src="${v.file}" preload="none" ${v.poster ? `poster="${v.poster}"` : ""}></video>
          <div class="thumb-overlay">
            <div class="play-btn">
              <svg width="14" height="16" viewBox="0 0 14 16" fill="white"><path d="M1 1l12 7-12 7V1z"/></svg>
            </div>
          </div>
          ${v.tag ? `<span class="card-tag-badge">${v.tag}</span>` : ""}
        </div>
        <div class="card-body">
          <div class="card-title">${v.title}</div>
          ${v.desc ? `<div class="card-desc">${v.desc}</div>` : ""}
          <div class="card-actions">
            <button class="btn btn-discord" data-discord="${i}">
              <svg width="13" height="10" viewBox="0 0 16 12" fill="none"><path d="M13.545 1.017A13.267 13.267 0 0 0 10.32 0c-.143.258-.31.605-.424.882a12.265 12.265 0 0 0-3.793 0A9.877 9.877 0 0 0 5.68 0 13.283 13.283 0 0 0 2.452 1.02C.353 4.157-.216 7.213.068 10.227a13.37 13.37 0 0 0 4.084 2.073c.33-.449.622-.927.874-1.431a8.697 8.697 0 0 1-1.376-.665c.115-.085.228-.173.337-.263 2.651 1.227 5.537 1.227 8.156 0 .11.09.222.178.337.263-.44.26-.9.486-1.378.666.252.504.544.983.875 1.43a13.344 13.344 0 0 0 4.087-2.073c.335-3.514-.571-6.541-2.52-9.21ZM5.34 8.375c-.818 0-1.49-.754-1.49-1.676 0-.921.657-1.678 1.49-1.678.832 0 1.504.757 1.49 1.678 0 .922-.657 1.676-1.49 1.676Zm5.32 0c-.819 0-1.49-.754-1.49-1.676 0-.921.657-1.678 1.49-1.678.833 0 1.504.757 1.49 1.678 0 .922-.656 1.676-1.49 1.676Z" fill="currentColor"/></svg>
              Copy Discord Link
            </button>
            <button class="btn btn-copy" data-copy="${i}">▶ Watch</button>
          </div>
        </div>
      `;

      // Watch button → open modal
      card.querySelector(`[data-copy="${i}"]`).addEventListener("click", () => openModal(i));

      // Discord link button
      card.querySelector(`[data-discord="${i}"]`).addEventListener("click", e => {
        navigator.clipboard.writeText(discordLink(i));
        const btn = e.currentTarget;
        btn.textContent = "✓ Copied!"; btn.classList.add("copied");
        setTimeout(() => { btn.innerHTML = `<svg width="13" height="10" viewBox="0 0 16 12" fill="none"><path d="M13.545 1.017A13.267 13.267 0 0 0 10.32 0c-.143.258-.31.605-.424.882a12.265 12.265 0 0 0-3.793 0A9.877 9.877 0 0 0 5.68 0 13.283 13.283 0 0 0 2.452 1.02C.353 4.157-.216 7.213.068 10.227a13.37 13.37 0 0 0 4.084 2.073c.33-.449.622-.927.874-1.431a8.697 8.697 0 0 1-1.376-.665c.115-.085.228-.173.337-.263 2.651 1.227 5.537 1.227 8.156 0 .11.09.222.178.337.263-.44.26-.9.486-1.378.666.252.504.544.983.875 1.43a13.344 13.344 0 0 0 4.087-2.073c.335-3.514-.571-6.541-2.52-9.21ZM5.34 8.375c-.818 0-1.49-.754-1.49-1.676 0-.921.657-1.678 1.49-1.678.832 0 1.504.757 1.49 1.678 0 .922-.657 1.676-1.49 1.676Zm5.32 0c-.819 0-1.49-.754-1.49-1.676 0-.921.657-1.678 1.49-1.678.833 0 1.504.757 1.49 1.678 0 .922-.656 1.676-1.49 1.676Z" fill="currentColor"/></svg> Copy Discord Link`; btn.classList.remove("copied"); }, 2000);
        showToast("Discord link copied!");
      });

      // Click thumbnail → open modal
      card.querySelector(".thumb-overlay").addEventListener("click", () => openModal(i));

      grid.appendChild(card);
    });

    if (count === 0) {
      grid.innerHTML = `<div class="no-results">No videos match your search.</div>`;
    }
  }

  // ── Modal ──────────────────────────────────────────────────────
  let currentIndex = null;
  function openModal(i) {
    const v = VIDEOS[i];
    currentIndex = i;
    modalVid.src = v.file;
    if (v.poster) modalVid.poster = v.poster;
    modalTitle.textContent = v.title;
    backdrop.classList.add("open");
    modalVid.play();
  }
  function closeModal() {
    modalVid.pause(); modalVid.src = "";
    backdrop.classList.remove("open");
    currentIndex = null;
  }
  document.getElementById("modal-close-btn").addEventListener("click", closeModal);
  backdrop.addEventListener("click", e => { if (e.target === backdrop) closeModal(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  document.getElementById("modal-discord-btn").addEventListener("click", () => {
    if (currentIndex === null) return;
    navigator.clipboard.writeText(discordLink(currentIndex));
    showToast("Discord link copied!");
  });
  document.getElementById("modal-copy-btn").addEventListener("click", () => {
    if (currentIndex === null) return;
    const v = VIDEOS[currentIndex];
    const absFile = v.file.startsWith("http") ? v.file : BASE_URL + "/" + v.file;
    navigator.clipboard.writeText(absFile);
    showToast("Direct video URL copied!");
  });

  // ── Toast ──────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
  }

  // Init
  render();
</script>
</body>
</html>
